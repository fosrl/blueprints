services:
  jellyfin:
    image: ${JELLYFIN_IMAGE:-ghcr.io/jellyfin/jellyfin}:${JELLYFIN_TAG:-latest}
    container_name: ${SERVICE_CONTAINER_NAME}
    restart: unless-stopped
    user: "0"
    env_file:
      - ./.env
    environment:
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl=https://${SERVICE_SUBDOMAIN}.${BASE_DOMAIN}
    expose:
      - "${SERVICE_PORT}"
    volumes:
      - ./data/config:/config:Z
      - ./data/cache:/cache:Z
      - ${JELLYFIN_MEDIA_PATH}:/media:ro,Z
    labels:
      - pangolin.public-resources.${BLUEPRINT_NAME}.name=${RESOURCE_NAME}
      - pangolin.public-resources.${BLUEPRINT_NAME}.full-domain=${SERVICE_SUBDOMAIN}.${BASE_DOMAIN}
      - pangolin.public-resources.${BLUEPRINT_NAME}.protocol=http
      - pangolin.public-resources.${BLUEPRINT_NAME}.targets[0].method=http
    networks:
      - pangolin

networks:
  pangolin:
    external: true
    name: ${PANGOLIN_DOCKER_NETWORK:-pangolin_default}
